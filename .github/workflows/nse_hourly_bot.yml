name: NSE Hourly Scanner Bot

on:
  repository_dispatch:
    types: [scheduled-scan]
  workflow_dispatch: # Manual trigger from GitHub Actions tab

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    env:
      # Future-proofing: Opt into Node.js 24 to resolve deprecation warnings
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # caching pip dependencies for faster runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scanner Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_ACTIONS: "true"
          SCAN_UNIVERSE: "Nifty 500"
          SCAN_INTERVAL: "1h"
        run: python automation_bot.py
